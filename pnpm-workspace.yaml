allowBuilds:
  "@swc/core": true
blockExoticSubdeps: true
minimumReleaseAge: 10080 # 1 week
node-linker: hoisted
overrides:
  ajv-keywords@^3.0.0: "^5.1.0"
  ajv@<6.14.0: ">=6.14.0"
  ajv@>=7.0.0-alpha.0 <8.18.0: ">=8.18.0"
  brace-expansion@<1.1.13: ">=1.1.13"
  flatted@<3.4.0: ">=3.4.0"
  flatted@<=3.4.1: ">=3.4.2"
  follow-redirects@<=1.15.11: ">=1.16.0"
  lodash@<=4.17.23: ">=4.18.0"
  lodash@>=4.0.0 <=4.17.23: ">=4.18.0"
  minimatch@<3.1.3: ">=3.1.3"
  minimatch@<3.1.4: ">=3.1.4"
  path-to-regexp@<0.1.13: ">=0.1.13"
  picomatch@<2.3.2: ">=2.3.2"
  schema-utils@^3.0.0: "^4.3.3"
  serialize-javascript@<7.0.5: ">=7.0.5"
  serialize-javascript@<=7.0.2: ">=7.0.3"
  svgo@>=3.0.0 <3.3.3: ">=3.3.3"
strictDepBuilds: true

# `trustPolicyExclude` copied from Docusaurus - as the repo doesn't install otherwise
# https://github.com/facebook/docusaurus/blob/9929ac0f6bc13c9ffbc6aa2cca419ff62234d3c6/.github/workflows/security-supply-chain.yml#L82
trustPolicy: no-downgrade
trustPolicyExclude:
  - "detect-port@1.6.1"
  - "semver@6.3.1"
